spring:
  datasource:
    url: jdbc:h2:mem:urlshortener;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  base-url: http://localhost:8080
  allowed-origins: http://localhost:5173
  rate-limit:
    requests-per-minute: 1000

