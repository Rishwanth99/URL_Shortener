spring:
  application:
    name: url-shortener
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/url_shortener}
    username: ${SPRING_DATASOURCE_USERNAME:url_user}
    password: ${SPRING_DATASOURCE_PASSWORD:url_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  error:
    include-message: never
    include-binding-errors: never

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173}
  rate-limit:
    requests-per-minute: ${APP_RATE_LIMIT_REQUESTS_PER_MINUTE:60}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

